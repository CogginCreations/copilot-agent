name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Type-check & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: copilot-agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: copilot-agent/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (source)
        run: npx tsc --noEmit

      - name: Type-check (tests)
        run: npx tsc -p tsconfig.test.json --noEmit

      - name: Run tests
        run: npm test
